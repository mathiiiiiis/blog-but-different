services:
  db:
    image: postgres:16-alpine
    container_name: dev-db-blog
    restart: unless-stopped
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
      POSTGRES_DB: blog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DEV_DB_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - blog-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dev-pgadmin-blog
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/pgadmin4/pgpass:ro
    ports:
      - "${DEV_PGADMIN_PORT:-15050}:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - blog-network

  minio:
    image: minio/minio:latest
    container_name: dev-minio-blog
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "${DEV_MINIO_API_PORT:-19000}:9000"
      - "${DEV_MINIO_CONSOLE_PORT:-19001}:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - blog-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dev-backend-blog
    restart: unless-stopped
    environment:
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://blog:blog@db:5432/blog
      DATABASE_URL_SYNC: postgresql://blog:blog@db:5432/blog
      ADMIN_EMAIL: admin@example.com
      ADMIN_DEFAULT_PASSWORD: changeme
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: blog
      MINIO_SECURE: "false"
      MINIO_PUBLIC_URL: ""
      SECRET_KEY: dev-secret-key-change-in-production
      CORS_ORIGINS: "*"
      KLIPY_API_KEY: ${KLIPY_API_KEY}
    volumes:
      - ./backend:/app
      - ./avatars:/app/avatars
    ports:
      - "${DEV_BACKEND_PORT:-18000}:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - blog-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dev-frontend-blog
    restart: unless-stopped
    ports:
      - "${DEV_FRONTEND_PORT:-13000}:80"
    depends_on:
      - backend
    networks:
      - blog-network

volumes:
  postgres_data:
  minio_data:
  pgadmin_data:

networks:
  blog-network:
    driver: bridge
